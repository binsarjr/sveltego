name: Bug Report
description: Defect in existing behavior.
title: "bug: <summary>"
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps. Include source `.svelte` and `_page.server.go` snippets.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: sveltego version, Go version, OS, Svelte version.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace

# Bench (Phase 0p): runs only on push-to-main (gate regressions at merge),
# nightly schedule, and manual dispatch. PR triggers removed to cut spend
# — feature PRs that touch hot paths can request bench via workflow_dispatch.
name: bench

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'benchmarks/**'
      - '.github/workflows/bench.yml'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false

      - name: Install benchstat and bench-compare
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          (cd benchmarks/cmd/bench-compare && go install)

      - name: Bench base (HEAD~1)
        # On main pushes, compare HEAD against the previous commit on main.
        # On schedule/dispatch, compare HEAD against HEAD~1 to detect drift
        # between scheduled runs.
        run: |
          git checkout HEAD~1
          go test -bench=. -benchmem -count=3 -run=^$ -benchtime=1x ./benchmarks/... \
            | tee /tmp/base.txt

      - name: Bench head (${{ github.sha }})
        run: |
          git checkout "${{ github.sha }}"
          go test -bench=. -benchmem -count=3 -run=^$ -benchtime=1x ./benchmarks/... \
            | tee /tmp/head.txt

      - name: Run bench-compare gate
        run: |
          set +e
          bench-compare -base /tmp/base.txt -head /tmp/head.txt | tee /tmp/bench.txt
          echo $? > /tmp/bench.exit
          set -e

      - name: Print bench report
        run: cat /tmp/bench.txt

      - name: Enforce gate
        run: exit "$(cat /tmp/bench.exit)"

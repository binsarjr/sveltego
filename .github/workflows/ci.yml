# CI budget split (Phase 0p):
#
# - PR runs (lite): 1 OS × 1 Go (ubuntu-latest, 1.25.x) + changes +
#   commit-lint + agents-sync. Roughly 4 jobs per push.
# - Push to main (full): 3 OS × 1 Go (1.25.x, matching go.work) + isolated-modules +
#   playground-smoke + agents-sync + changes. Full coverage at merge.
# - Docs-only diffs (`**.md`, `tasks/**`, `docs/**`) skip CI entirely
#   via paths-ignore.
# - Concurrency cancels stale runs on the same ref.
name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'tasks/**'
      - 'tasks/decisions/**'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'tasks/**'
      - 'tasks/decisions/**'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes (path-aware fan-out)
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      sveltego: ${{ steps.filter.outputs.sveltego }}
      adapter-auto: ${{ steps.filter.outputs.adapter-auto }}
      adapter-cloudflare: ${{ steps.filter.outputs.adapter-cloudflare }}
      adapter-docker: ${{ steps.filter.outputs.adapter-docker }}
      adapter-lambda: ${{ steps.filter.outputs.adapter-lambda }}
      adapter-server: ${{ steps.filter.outputs.adapter-server }}
      adapter-static: ${{ steps.filter.outputs.adapter-static }}
      enhanced-img: ${{ steps.filter.outputs.enhanced-img }}
      create-sveltego: ${{ steps.filter.outputs.create-sveltego }}
      mcp: ${{ steps.filter.outputs.mcp }}
      lsp: ${{ steps.filter.outputs.lsp }}
      playground: ${{ steps.filter.outputs.playground }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
      test-utils: ${{ steps.filter.outputs.test-utils }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sveltego: 'packages/sveltego/**'
            adapter-auto: 'packages/adapter-auto/**'
            adapter-cloudflare: 'packages/adapter-cloudflare/**'
            adapter-docker: 'packages/adapter-docker/**'
            adapter-lambda: 'packages/adapter-lambda/**'
            adapter-server: 'packages/adapter-server/**'
            adapter-static: 'packages/adapter-static/**'
            enhanced-img: 'packages/enhanced-img/**'
            create-sveltego: 'packages/create-sveltego/**'
            mcp: 'packages/mcp/**'
            lsp: 'packages/lsp/**'
            playground: ['playgrounds/basic/**', 'playgrounds/dashboard/**']
            benchmarks: 'benchmarks/**'
            test-utils: 'test-utils/**'
            shared:
              - 'go.work'
              - '.golangci.yml'
              - '.github/workflows/**'
              - 'test-utils/**'

  # Lite matrix on PRs: ubuntu-latest, go1.25.x. ~1 job.
  lint-and-test-pr:
    name: lint-and-test (${{ matrix.os }}, go${{ matrix.go }})
    if: github.event_name == 'pull_request'
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        go: ['1.25.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Cache Go module and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-

      - name: Install pinned tools
        shell: bash
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest

      - name: gofumpt format check
        shell: bash
        run: |
          out=$(gofumpt -l .)
          if [ -n "$out" ]; then
            echo "gofumpt would reformat the following files:"
            echo "$out"
            exit 1
          fi

      - name: goimports check
        shell: bash
        run: |
          out=$(goimports -l -local github.com/binsarjr/sveltego .)
          if [ -n "$out" ]; then
            echo "goimports would reformat the following files:"
            echo "$out"
            exit 1
          fi

      - name: Install golangci-lint
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$(go env GOPATH)/bin"
          curl -sSfL -o /tmp/golangci-install.sh https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh
          sh /tmp/golangci-install.sh -b "$(go env GOPATH)/bin" v1.64.8
          "$(go env GOPATH)/bin/golangci-lint" --version

      - name: golangci-lint (per module, ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          CREATE_SVELTEGO: ${{ needs.changes.outputs.create-sveltego }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
          TEST_UTILS: ${{ needs.changes.outputs.test-utils }}
        run: |
          set -euo pipefail
          PATH="$(go env GOPATH)/bin:$PATH"
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/create-sveltego)      [[ "$CREATE_SVELTEGO" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
                */test-utils)                    [[ "$TEST_UTILS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::golangci-lint $d"
            (cd "$d" && golangci-lint run --config "$GITHUB_WORKSPACE/.golangci.yml" ./...)
            echo "::endgroup::"
          done

      - name: go vet (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          CREATE_SVELTEGO: ${{ needs.changes.outputs.create-sveltego }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
          TEST_UTILS: ${{ needs.changes.outputs.test-utils }}
        run: |
          set -euo pipefail
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/create-sveltego)      [[ "$CREATE_SVELTEGO" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
                */test-utils)                    [[ "$TEST_UTILS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::go vet $d"
            (cd "$d" && go vet ./...)
            echo "::endgroup::"
          done

      - name: go test -race + coverage (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          CREATE_SVELTEGO: ${{ needs.changes.outputs.create-sveltego }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
          TEST_UTILS: ${{ needs.changes.outputs.test-utils }}
        run: |
          set -euo pipefail
          mkdir -p coverage
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/create-sveltego)      [[ "$CREATE_SVELTEGO" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
                */test-utils)                    [[ "$TEST_UTILS" == "true" ]]          || continue ;;
              esac
            fi
            slug=$(basename "$d")
            echo "::group::go test $d"
            (cd "$d" && go test -race -count=1 -coverprofile="coverage-${slug}.out" -coverpkg=./... ./... || exit 1)
            if [ -f "$d/coverage-${slug}.out" ]; then
              cp "$d/coverage-${slug}.out" "coverage/${slug}.out"
            fi
            echo "::endgroup::"
          done

      - name: go build (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          CREATE_SVELTEGO: ${{ needs.changes.outputs.create-sveltego }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
          TEST_UTILS: ${{ needs.changes.outputs.test-utils }}
        run: |
          set -euo pipefail
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/create-sveltego)      [[ "$CREATE_SVELTEGO" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
                */test-utils)                    [[ "$TEST_UTILS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::go build $d"
            (cd "$d" && go build ./...)
            echo "::endgroup::"
          done

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25.x'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          fail_ci_if_error: false

  # Full matrix on push to main: 3 OS × 1 Go (1.25.x, matching go.work). ~3 jobs.
  lint-and-test-main:
    name: lint-and-test (${{ matrix.os }}, go${{ matrix.go }})
    if: github.event_name == 'push'
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.25.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Cache Go module and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-

      - name: Install pinned tools
        shell: bash
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest

      - name: gofumpt format check
        shell: bash
        run: |
          out=$(gofumpt -l .)
          if [ -n "$out" ]; then
            echo "gofumpt would reformat the following files:"
            echo "$out"
            exit 1
          fi

      - name: goimports check
        shell: bash
        run: |
          out=$(goimports -l -local github.com/binsarjr/sveltego .)
          if [ -n "$out" ]; then
            echo "goimports would reformat the following files:"
            echo "$out"
            exit 1
          fi

      - name: Install golangci-lint
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$(go env GOPATH)/bin"
          curl -sSfL -o /tmp/golangci-install.sh https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh
          sh /tmp/golangci-install.sh -b "$(go env GOPATH)/bin" v1.64.8
          "$(go env GOPATH)/bin/golangci-lint" --version

      - name: golangci-lint (per module, ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          CREATE_SVELTEGO: ${{ needs.changes.outputs.create-sveltego }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
          TEST_UTILS: ${{ needs.changes.outputs.test-utils }}
        run: |
          set -euo pipefail
          PATH="$(go env GOPATH)/bin:$PATH"
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/create-sveltego)      [[ "$CREATE_SVELTEGO" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
                */test-utils)                    [[ "$TEST_UTILS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::golangci-lint $d"
            (cd "$d" && golangci-lint run --config "$GITHUB_WORKSPACE/.golangci.yml" ./...)
            echo "::endgroup::"
          done

      - name: go vet (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          CREATE_SVELTEGO: ${{ needs.changes.outputs.create-sveltego }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
          TEST_UTILS: ${{ needs.changes.outputs.test-utils }}
        run: |
          set -euo pipefail
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/create-sveltego)      [[ "$CREATE_SVELTEGO" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
                */test-utils)                    [[ "$TEST_UTILS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::go vet $d"
            (cd "$d" && go vet ./...)
            echo "::endgroup::"
          done

      - name: go test -race + coverage (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          CREATE_SVELTEGO: ${{ needs.changes.outputs.create-sveltego }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
          TEST_UTILS: ${{ needs.changes.outputs.test-utils }}
        run: |
          set -euo pipefail
          mkdir -p coverage
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/create-sveltego)      [[ "$CREATE_SVELTEGO" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
                */test-utils)                    [[ "$TEST_UTILS" == "true" ]]          || continue ;;
              esac
            fi
            slug=$(basename "$d")
            echo "::group::go test $d"
            (cd "$d" && go test -race -count=1 -coverprofile="coverage-${slug}.out" -coverpkg=./... ./... || exit 1)
            if [ -f "$d/coverage-${slug}.out" ]; then
              cp "$d/coverage-${slug}.out" "coverage/${slug}.out"
            fi
            echo "::endgroup::"
          done

      - name: go build (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          CREATE_SVELTEGO: ${{ needs.changes.outputs.create-sveltego }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
          TEST_UTILS: ${{ needs.changes.outputs.test-utils }}
        run: |
          set -euo pipefail
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/create-sveltego)      [[ "$CREATE_SVELTEGO" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
                */test-utils)                    [[ "$TEST_UTILS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::go build $d"
            (cd "$d" && go build ./...)
            echo "::endgroup::"
          done

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25.x'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          fail_ci_if_error: false

  # Push-to-main only: catches per-module isolation breakage that the
  # workspace path can mask. Skipped on PRs to keep PR runs lean.
  isolated-modules:
    name: isolated-modules (GOWORK=off)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Cache Go module and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-1.25.x-isolated-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.25.x-isolated-

      - name: Build and test each module in isolation
        shell: bash
        run: |
          set -euo pipefail
          . scripts/ci/skip-playgrounds.sh
          mods=$(find packages playgrounds benchmarks test-utils -maxdepth 2 -name go.mod 2>/dev/null || true)
          if [ -z "$mods" ]; then
            echo "no go.mod files found under packages/playgrounds/benchmarks/test-utils"
            exit 1
          fi
          for m in $mods; do
            d=$(dirname "$m")
            should_skip_playground "$d" && continue
            echo "::group::isolated $d"
            (cd "$d" && go mod download && go build ./... && go test -race -short ./...)
            echo "::endgroup::"
          done

  commit-lint:
    name: commit-lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Conventional Commits
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=0 || true
          bash scripts/validate-commits.sh "origin/${{ github.base_ref }}..HEAD"

  agents-sync:
    name: agents-sync (AGENTS.md drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate AI rule files from AGENTS.md
        run: bash scripts/sync-ai-docs.sh

      - name: Fail on drift
        shell: bash
        run: |
          if ! git diff --exit-code -- .cursorrules .github/copilot-instructions.md; then
            echo "AI rule files out of sync with AGENTS.md."
            echo "Run: bash scripts/sync-ai-docs.sh"
            echo "Then commit .cursorrules and .github/copilot-instructions.md."
            exit 1
          fi

  # Push-to-main only: end-to-end check (compile + build + curl) for the
  # playground binary. PRs skip this — feature PRs that need it can run
  # locally via `playgrounds/basic/Makefile` (manual gate).
  playground-smoke:
    name: playground-smoke (basic)
    if: github.event_name == 'push'
    needs: lint-and-test-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Compile + Build
        working-directory: playgrounds/basic
        run: |
          go run github.com/binsarjr/sveltego/cmd/sveltego compile
          go run github.com/binsarjr/sveltego/cmd/sveltego build --out ./build/app

      - name: Idempotency check
        working-directory: playgrounds/basic
        shell: bash
        run: |
          set -euo pipefail
          find .gen -type f -exec sha256sum {} + | sort > /tmp/gen-1.sum
          rm -rf .gen
          go run github.com/binsarjr/sveltego/cmd/sveltego compile
          find .gen -type f -exec sha256sum {} + | sort > /tmp/gen-2.sum
          diff /tmp/gen-1.sum /tmp/gen-2.sum

      - name: Rebuild binary after re-compile
        working-directory: playgrounds/basic
        run: go run github.com/binsarjr/sveltego/cmd/sveltego build --out ./build/app

      - name: Start server
        working-directory: playgrounds/basic
        shell: bash
        run: |
          ./build/app &
          echo $! > server.pid
          for i in 1 2 3 4 5; do
            if curl -fsS -o /dev/null http://localhost:3000/; then
              exit 0
            fi
            sleep 1
          done
          echo "server did not become ready"
          kill "$(cat server.pid)" 2>/dev/null || true
          exit 1

      - name: Curl /
        run: curl -fsS http://localhost:3000/ | tee /tmp/root.html | grep "Hello, sveltego!"

      - name: Curl /post/123
        run: curl -fsS http://localhost:3000/post/123 | tee /tmp/post.html | grep "Post 123"

      - name: Stop server
        if: always()
        working-directory: playgrounds/basic
        shell: bash
        run: |
          if [ -f server.pid ]; then kill "$(cat server.pid)" 2>/dev/null || true; fi

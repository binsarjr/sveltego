# CI budget split (Phase 0p + merge queue):
#
# - PR runs (lite): 1 OS × 1 Go (ubuntu-latest, 1.25.x) + changes +
#   commit-lint + agents-sync. Roughly 4 jobs per push.
# - merge_group runs: 1.25.x only + isolated-modules (no playground-smoke).
#   CI runs once on the merged candidate; cancel-in-progress is disabled so
#   the queue run always completes.
# - Push to main: DISABLED. Flaky post-merge runs on main added noise without
#   catching real regressions (PR-time + merge_group already validate every SHA
#   before it lands). Re-enable if a genuine main-only failure class emerges.
# - Docs-only diffs (`**.md`, `tasks/**`, `docs/**`) skip CI entirely
#   via paths-ignore.
# - Concurrency: PR runs cancel-in-progress; merge_group runs do not.
name: ci

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'tasks/**'
      - 'tasks/decisions/**'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: changes (path-aware fan-out)
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      sveltego: ${{ steps.filter.outputs.sveltego }}
      adapter-auto: ${{ steps.filter.outputs.adapter-auto }}
      adapter-cloudflare: ${{ steps.filter.outputs.adapter-cloudflare }}
      adapter-docker: ${{ steps.filter.outputs.adapter-docker }}
      adapter-lambda: ${{ steps.filter.outputs.adapter-lambda }}
      adapter-server: ${{ steps.filter.outputs.adapter-server }}
      adapter-static: ${{ steps.filter.outputs.adapter-static }}
      enhanced-img: ${{ steps.filter.outputs.enhanced-img }}
      init: ${{ steps.filter.outputs.init }}
      mcp: ${{ steps.filter.outputs.mcp }}
      lsp: ${{ steps.filter.outputs.lsp }}
      playground: ${{ steps.filter.outputs.playground }}
      benchmarks: ${{ steps.filter.outputs.benchmarks }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sveltego: 'packages/sveltego/**'
            adapter-auto: 'packages/adapter-auto/**'
            adapter-cloudflare: 'packages/adapter-cloudflare/**'
            adapter-docker: 'packages/adapter-docker/**'
            adapter-lambda: 'packages/adapter-lambda/**'
            adapter-server: 'packages/adapter-server/**'
            adapter-static: 'packages/adapter-static/**'
            enhanced-img: 'packages/enhanced-img/**'
            init: 'packages/init/**'
            mcp: 'packages/mcp/**'
            lsp: 'packages/lsp/**'
            playground: ['playgrounds/basic/**', 'playgrounds/blog/**', 'playgrounds/dashboard/**', 'playgrounds/ssr-stress/**', 'playgrounds/static/**']
            benchmarks: 'benchmarks/**'
            shared:
              - 'go.work'
              - '.golangci.yml'
              - '.github/workflows/**'

  # Lite matrix on PRs: ubuntu-latest, go1.25.x. ~1 job. Validates new floor.
  lint-and-test-pr:
    name: lint-and-test (${{ matrix.os }}, go${{ matrix.go }})
    if: github.event_name == 'pull_request'
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        go: ['1.25.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Cache Go module and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-

      - name: Install pinned tools
        shell: bash
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest

      - name: gofumpt format check
        shell: bash
        run: |
          out=$(gofumpt -l .)
          if [ -n "$out" ]; then
            echo "gofumpt would reformat the following files:"
            echo "$out"
            exit 1
          fi

      - name: goimports check
        shell: bash
        run: |
          out=$(goimports -l -local github.com/binsarjr/sveltego .)
          if [ -n "$out" ]; then
            echo "goimports would reformat the following files:"
            echo "$out"
            exit 1
          fi

      - name: Install golangci-lint
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$(go env GOPATH)/bin"
          curl -sSfL -o /tmp/golangci-install.sh https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh
          sh /tmp/golangci-install.sh -b "$(go env GOPATH)/bin" v2.11.4
          "$(go env GOPATH)/bin/golangci-lint" --version

      - name: golangci-lint (per module, ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          INIT: ${{ needs.changes.outputs.init }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
        run: |
          set -euo pipefail
          PATH="$(go env GOPATH)/bin:$PATH"
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/init)      [[ "$INIT" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::golangci-lint $d"
            (cd "$d" && golangci-lint run --config "$GITHUB_WORKSPACE/.golangci.yml" ./...)
            echo "::endgroup::"
          done

      - name: go vet (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          INIT: ${{ needs.changes.outputs.init }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
        run: |
          set -euo pipefail
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/init)      [[ "$INIT" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::go vet $d"
            (cd "$d" && go vet ./...)
            echo "::endgroup::"
          done

      - name: go test -race + coverage (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          INIT: ${{ needs.changes.outputs.init }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
        run: |
          set -euo pipefail
          mkdir -p coverage
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/init)      [[ "$INIT" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
              esac
            fi
            slug=$(basename "$d")
            echo "::group::go test $d"
            (cd "$d" && go test -race -count=1 -coverprofile="coverage-${slug}.out" -coverpkg=./... ./... || exit 1)
            if [ -f "$d/coverage-${slug}.out" ]; then
              cp "$d/coverage-${slug}.out" "coverage/${slug}.out"
            fi
            echo "::endgroup::"
          done

      - name: go build (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          INIT: ${{ needs.changes.outputs.init }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
        run: |
          set -euo pipefail
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/init)      [[ "$INIT" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::go build $d"
            (cd "$d" && go build ./...)
            echo "::endgroup::"
          done

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25.x'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          fail_ci_if_error: false

  # merge_group: 1 OS × 1 Go. Validates the merged candidate before landing.
  lint-and-test-merge:
    name: lint-and-test (${{ matrix.os }}, go${{ matrix.go }})
    if: github.event_name == 'merge_group'
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        go: ['1.25.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Cache Go module and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-

      - name: Install pinned tools
        shell: bash
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest

      - name: gofumpt format check
        shell: bash
        run: |
          out=$(gofumpt -l .)
          if [ -n "$out" ]; then
            echo "gofumpt would reformat the following files:"
            echo "$out"
            exit 1
          fi

      - name: goimports check
        shell: bash
        run: |
          out=$(goimports -l -local github.com/binsarjr/sveltego .)
          if [ -n "$out" ]; then
            echo "goimports would reformat the following files:"
            echo "$out"
            exit 1
          fi

      - name: Install golangci-lint
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$(go env GOPATH)/bin"
          curl -sSfL -o /tmp/golangci-install.sh https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh
          sh /tmp/golangci-install.sh -b "$(go env GOPATH)/bin" v2.11.4
          "$(go env GOPATH)/bin/golangci-lint" --version

      - name: golangci-lint (per module, ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          INIT: ${{ needs.changes.outputs.init }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
        run: |
          set -euo pipefail
          PATH="$(go env GOPATH)/bin:$PATH"
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/init)      [[ "$INIT" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::golangci-lint $d"
            (cd "$d" && golangci-lint run --config "$GITHUB_WORKSPACE/.golangci.yml" ./...)
            echo "::endgroup::"
          done

      - name: go vet (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          INIT: ${{ needs.changes.outputs.init }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
        run: |
          set -euo pipefail
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/init)      [[ "$INIT" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::go vet $d"
            (cd "$d" && go vet ./...)
            echo "::endgroup::"
          done

      - name: go test -race + coverage (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          INIT: ${{ needs.changes.outputs.init }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
        run: |
          set -euo pipefail
          mkdir -p coverage
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/init)      [[ "$INIT" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
              esac
            fi
            slug=$(basename "$d")
            echo "::group::go test $d"
            (cd "$d" && go test -race -count=1 -coverprofile="coverage-${slug}.out" -coverpkg=./... ./... || exit 1)
            if [ -f "$d/coverage-${slug}.out" ]; then
              cp "$d/coverage-${slug}.out" "coverage/${slug}.out"
            fi
            echo "::endgroup::"
          done

      - name: go build (changed modules)
        shell: bash
        env:
          SHARED: ${{ needs.changes.outputs.shared }}
          SVELTEGO: ${{ needs.changes.outputs.sveltego }}
          ADAPTER_AUTO: ${{ needs.changes.outputs.adapter-auto }}
          ADAPTER_CLOUDFLARE: ${{ needs.changes.outputs.adapter-cloudflare }}
          ADAPTER_DOCKER: ${{ needs.changes.outputs.adapter-docker }}
          ADAPTER_LAMBDA: ${{ needs.changes.outputs.adapter-lambda }}
          ADAPTER_SERVER: ${{ needs.changes.outputs.adapter-server }}
          ADAPTER_STATIC: ${{ needs.changes.outputs.adapter-static }}
          ENHANCED_IMG: ${{ needs.changes.outputs.enhanced-img }}
          INIT: ${{ needs.changes.outputs.init }}
          MCP: ${{ needs.changes.outputs.mcp }}
          LSP: ${{ needs.changes.outputs.lsp }}
          PLAYGROUND: ${{ needs.changes.outputs.playground }}
          BENCHMARKS: ${{ needs.changes.outputs.benchmarks }}
        run: |
          set -euo pipefail
          . scripts/ci/skip-playgrounds.sh
          dirs=$(go list -m -f '{{.Dir}}')
          for d in $dirs; do
            should_skip_playground "$d" && continue
            if [[ "$SHARED" != "true" ]]; then
              case "$d" in
                */packages/sveltego)             [[ "$SVELTEGO" == "true" ]]            || continue ;;
                */packages/adapter-auto)         [[ "$ADAPTER_AUTO" == "true" ]]        || continue ;;
                */packages/adapter-cloudflare)   [[ "$ADAPTER_CLOUDFLARE" == "true" ]]  || continue ;;
                */packages/adapter-docker)       [[ "$ADAPTER_DOCKER" == "true" ]]      || continue ;;
                */packages/adapter-lambda)       [[ "$ADAPTER_LAMBDA" == "true" ]]      || continue ;;
                */packages/adapter-server)       [[ "$ADAPTER_SERVER" == "true" ]]      || continue ;;
                */packages/adapter-static)       [[ "$ADAPTER_STATIC" == "true" ]]      || continue ;;
                */packages/enhanced-img)         [[ "$ENHANCED_IMG" == "true" ]]        || continue ;;
                */packages/init)      [[ "$INIT" == "true" ]]     || continue ;;
                */packages/mcp)                  [[ "$MCP" == "true" ]]                 || continue ;;
                */packages/lsp)                  [[ "$LSP" == "true" ]]                 || continue ;;
                */benchmarks)                    [[ "$BENCHMARKS" == "true" ]]          || continue ;;
              esac
            fi
            echo "::group::go build $d"
            (cd "$d" && go build ./...)
            echo "::endgroup::"
          done

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25.x'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          fail_ci_if_error: false

  # merge_group: catches per-module isolation breakage that the workspace path
  # can mask. Skipped on PRs to keep PR runs lean.
  isolated-modules:
    name: isolated-modules (GOWORK=off)
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Cache Go module and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-1.25.x-isolated-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.25.x-isolated-

      - name: Build and test each module in isolation
        shell: bash
        run: |
          set -euo pipefail
          . scripts/ci/skip-playgrounds.sh
          mods=$(find packages playgrounds benchmarks -maxdepth 2 -name go.mod 2>/dev/null || true)
          if [ -z "$mods" ]; then
            echo "no go.mod files found under packages/playgrounds/benchmarks"
            exit 1
          fi
          for m in $mods; do
            d=$(dirname "$m")
            should_skip_playground "$d" && continue
            echo "::group::isolated $d"
            (cd "$d" && go mod download && go build ./... && go test -race -short ./...)
            echo "::endgroup::"
          done

  commit-lint:
    name: commit-lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Conventional Commits
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=0 || true
          bash scripts/validate-commits.sh "origin/${{ github.base_ref }}..HEAD"

  agents-sync:
    name: agents-sync (AGENTS.md drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate AI rule files from AGENTS.md
        run: bash scripts/sync-ai-docs.sh

      - name: Fail on drift
        shell: bash
        run: |
          if ! git diff --exit-code -- .cursorrules .github/copilot-instructions.md; then
            echo "AI rule files out of sync with AGENTS.md."
            echo "Run: bash scripts/sync-ai-docs.sh"
            echo "Then commit .cursorrules and .github/copilot-instructions.md."
            exit 1
          fi

  # Smoke test for `go run github.com/binsarjr/sveltego/packages/init/cmd/sveltego-init@latest`.
  # CI cannot use a real proxy fetch (init has no tags yet) so this job
  # routes the deep import path through the worktree via a temporary
  # go.mod with a `replace` directive, then asserts the produced tree
  # matches the canonical sveltego-init binary built from the same
  # checkout. The "no replace in packages/init/go.mod" assertion guards
  # the @latest path that real users will take once init is tagged.
  init-smoke:
    name: init-smoke (go run @latest)
    needs: changes
    if: |
      (needs.changes.outputs.shared == 'true' ||
       needs.changes.outputs.init == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Assert no replace in packages/init/go.mod
        shell: bash
        run: |
          set -euo pipefail
          if grep -E '^[[:space:]]*replace[[:space:]]' packages/init/go.mod; then
            echo "packages/init/go.mod must not declare a replace directive."
            echo "Inline templates instead — go run @latest cannot resolve replaces from a fresh GOPATH."
            exit 1
          fi

      - name: Build canonical sveltego-init
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          go build -o "$RUNNER_TEMP/bin/sveltego-init" ./packages/init/cmd/sveltego-init

      - name: Direct binary produces a tree
        shell: bash
        run: |
          set -euo pipefail
          out_direct="$RUNNER_TEMP/out-direct"
          rm -rf "$out_direct"
          "$RUNNER_TEMP/bin/sveltego-init" --non-interactive \
            --module example.com/x "$out_direct"
          test -f "$out_direct/go.mod"
          test -f "$out_direct/cmd/app/main.go"
          test -f "$out_direct/src/routes/_page.svelte"

      - name: go run via deep import path produces identical tree
        shell: bash
        run: |
          set -euo pipefail
          # Stand up a throwaway module that requires packages/init via a
          # local replace, then `go run` the deep import path. This mirrors
          # the @latest flow byte-for-byte (modulo the proxy fetch) and
          # proves the deep path resolves once a tag exists.
          driver="$RUNNER_TEMP/driver"
          rm -rf "$driver"
          mkdir -p "$driver"
          cat > "$driver/go.mod" <<EOF
          module example.com/init-smoke

          go 1.25

          require github.com/binsarjr/sveltego/packages/init v0.0.0-00010101000000-000000000000

          replace github.com/binsarjr/sveltego/packages/init => $GITHUB_WORKSPACE/packages/init
          EOF
          out_run="$RUNNER_TEMP/out-run"
          rm -rf "$out_run"
          (cd "$driver" && GOWORK=off GOFLAGS=-mod=mod go run \
            github.com/binsarjr/sveltego/packages/init/cmd/sveltego-init \
            --non-interactive --module example.com/x "$out_run")

          out_direct="$RUNNER_TEMP/out-direct"
          diff -r "$out_direct" "$out_run"

  # Smoke test for `go install github.com/binsarjr/sveltego/packages/sveltego/cmd/sveltego@main`
  # (the path users take from a fresh GOPATH per #377). The proxy refuses
  # `go install` when the module declares any `replace` directives, so the
  # first assertion guards against re-introducing one. The second assertion
  # mirrors init-smoke: a temporary driver module pins the local checkout
  # via `replace`, then proves the deep-import-path resolves and produces a
  # runnable binary. Closes #377.
  sveltego-build-smoke:
    name: sveltego-build-smoke (go install @main)
    needs: changes
    if: |
      (needs.changes.outputs.shared == 'true' ||
       needs.changes.outputs.sveltego == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Assert no replace in packages/sveltego/go.mod
        shell: bash
        run: |
          set -euo pipefail
          if grep -E '^[[:space:]]*replace[[:space:]]' packages/sveltego/go.mod; then
            echo "packages/sveltego/go.mod must not declare a replace directive."
            echo "go install @version cannot resolve a module that has replaces from the proxy."
            exit 1
          fi

      - name: go run via deep import path produces a working CLI
        shell: bash
        run: |
          set -euo pipefail
          driver="$RUNNER_TEMP/driver-sveltego"
          rm -rf "$driver"
          mkdir -p "$driver"
          cat > "$driver/go.mod" <<MODEOF
          module example.com/sveltego-smoke

          go 1.25

          require github.com/binsarjr/sveltego/packages/sveltego v0.0.0-00010101000000-000000000000

          replace github.com/binsarjr/sveltego/packages/sveltego => $GITHUB_WORKSPACE/packages/sveltego
          MODEOF
          (cd "$driver" && GOWORK=off GOFLAGS=-mod=mod go run \
            github.com/binsarjr/sveltego/packages/sveltego/cmd/sveltego version)

  # End-to-end check (compile + build + curl) for each playground binary.
  # Runs on PRs and the merge queue when sveltego core, playgrounds, or
  # shared infra changes. Asserts SSR HTML, the hydration payload script,
  # and the __data.json endpoint produced by the hydration triad (#352)
  # so the minimum-runnable contract stays green across hydration work.
  playground-smoke:
    name: playground-smoke (${{ matrix.playground }})
    needs: [changes, lint-and-test-pr]
    if: |
      (needs.changes.outputs.shared == 'true' ||
       needs.changes.outputs.sveltego == 'true' ||
       needs.changes.outputs.playground == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          # ssr_home / ssr_extra are HTML fragments that MUST appear in the
          # rendered <body> outside the hydration JSON payload. They pin the
          # SSR contract for the original empty-`<div id="app">` regression
          # (#420 / #421): plain `home_match` could match the JSON payload
          # alone, masking a broken SSR pipeline. When unset for a playground
          # the body assertion is skipped (soft-fallback / SPA-only routes).
          - playground: basic
            port: 3000
            home_match: 'Hello, sveltego!'
            ssr_home: '<h1>Hello, sveltego!</h1>'
            extra_path: /post/123
            extra_match: 'Post 123'
            ssr_extra: '<h1>Post 123</h1>'
          - playground: blog
            port: 8080
            home_match: 'sveltego blog'
            extra_path: /pagination-and-actions
            extra_match: 'Pagination and actions'
          - playground: dashboard
            port: 3000
            home_match: 'sveltego dashboard'
            extra_path: /login
            extra_match: '"routeId":"/login"'
          - playground: ssr-stress
            port: 3000
            home_match: 'ssr-stress index'
            ssr_home: '<h1>ssr-stress index</h1>'
            extra_path: /longlist
            extra_match: '"routeId":"/longlist"'
            ssr_extra: '<li>item 0</li>'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sidecar deps
        working-directory: packages/sveltego/internal/codegen/svelterender/sidecar
        run: npm ci --no-audit --no-fund

      - name: Compile + Build
        working-directory: playgrounds/${{ matrix.playground }}
        run: |
          go run github.com/binsarjr/sveltego/packages/sveltego/cmd/sveltego compile
          go run github.com/binsarjr/sveltego/packages/sveltego/cmd/sveltego build --out ./build/app --no-client

      - name: Idempotency check
        working-directory: playgrounds/${{ matrix.playground }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .gen
          go run github.com/binsarjr/sveltego/packages/sveltego/cmd/sveltego compile
          find .gen -type f -exec sha256sum {} + | sort > /tmp/gen-1.sum
          rm -rf .gen
          go run github.com/binsarjr/sveltego/packages/sveltego/cmd/sveltego compile
          find .gen -type f -exec sha256sum {} + | sort > /tmp/gen-2.sum
          diff /tmp/gen-1.sum /tmp/gen-2.sum

      - name: Rebuild binary after re-compile
        working-directory: playgrounds/${{ matrix.playground }}
        run: go run github.com/binsarjr/sveltego/packages/sveltego/cmd/sveltego build --out ./build/app --no-client

      - name: Start server
        working-directory: playgrounds/${{ matrix.playground }}
        shell: bash
        run: |
          ./build/app &
          echo $! > server.pid
          for i in 1 2 3 4 5 6 7 8; do
            if curl -fsS -o /dev/null "http://localhost:${{ matrix.port }}/"; then
              exit 0
            fi
            sleep 1
          done
          echo "server did not become ready"
          kill "$(cat server.pid)" 2>/dev/null || true
          exit 1

      - name: Curl / (SSR + hydration payload)
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "http://localhost:${{ matrix.port }}/" | tee /tmp/root.html
          grep -F '${{ matrix.home_match }}' /tmp/root.html
          grep -F '<script id="sveltego-data" type="application/json">' /tmp/root.html

      - name: Assert SSR body for /
        if: matrix.ssr_home != ''
        shell: bash
        run: |
          set -euo pipefail
          # Strip the hydration JSON payload so we can prove SSR HTML lands
          # in the page body, not just inside the JSON. Closes the original
          # empty-`<div id="app">` regression (#420).
          python3 -c 'import re,sys; s=open("/tmp/root.html").read(); s=re.sub(r"<script id=\"sveltego-data\"[\s\S]*?</script>","",s); sys.stdout.write(s)' > /tmp/root.body
          grep -F '${{ matrix.ssr_home }}' /tmp/root.body

      - name: Curl ${{ matrix.extra_path }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "http://localhost:${{ matrix.port }}${{ matrix.extra_path }}" | tee /tmp/extra.html
          grep -F '${{ matrix.extra_match }}' /tmp/extra.html
          grep -F '<script id="sveltego-data" type="application/json">' /tmp/extra.html

      - name: Assert SSR body for ${{ matrix.extra_path }}
        if: matrix.ssr_extra != ''
        shell: bash
        run: |
          set -euo pipefail
          python3 -c 'import re,sys; s=open("/tmp/extra.html").read(); s=re.sub(r"<script id=\"sveltego-data\"[\s\S]*?</script>","",s); sys.stdout.write(s)' > /tmp/extra.body
          grep -F '${{ matrix.ssr_extra }}' /tmp/extra.body

      - name: Curl /__data.json
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -i "http://localhost:${{ matrix.port }}/__data.json" | tee /tmp/data.txt
          grep -i '^content-type: application/json' /tmp/data.txt
          grep -i '^x-sveltego-data: 1' /tmp/data.txt
          grep -F '"routeId":"/"' /tmp/data.txt

      - name: Stop server
        if: always()
        working-directory: playgrounds/${{ matrix.playground }}
        shell: bash
        run: |
          if [ -f server.pid ]; then kill "$(cat server.pid)" 2>/dev/null || true; fi

  # adapter-static smoke (#457): drives `sveltego prerender` against the
  # static playground (Svelte+Prerender, #467) and asserts the deploy
  # tree carries an HTML file per route. Skipped via the paths filter
  # when adapter-static, sveltego, the static playground, or shared
  # infra are all unchanged.
  adapter-static-smoke:
    name: adapter-static-smoke
    needs: [changes, lint-and-test-pr]
    if: |
      (needs.changes.outputs.shared == 'true' ||
       needs.changes.outputs.sveltego == 'true' ||
       needs.changes.outputs.adapter-static == 'true' ||
       needs.changes.outputs.playground == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sidecar deps
        working-directory: packages/sveltego/internal/codegen/svelterender/sidecar
        run: npm ci --no-audit --no-fund

      - name: Run sveltego prerender (adapter-static smoke)
        working-directory: playgrounds/static
        run: |
          rm -rf build
          go run github.com/binsarjr/sveltego/packages/sveltego/cmd/sveltego prerender --out=build

      - name: Assert SSG output
        working-directory: playgrounds/static
        shell: bash
        run: |
          set -euo pipefail
          test -f build/manifest.json
          test -f build/about/index.html
          test -f build/index/index.html
          grep -F '<h1>About sveltego static</h1>' build/about/index.html
          grep -F '<h1>sveltego static index</h1>' build/index/index.html

  # Hydration-parity smoke (#446): builds each playground with the client
  # bundle, drives a headless Chromium, and fails on Svelte
  # hydration_mismatch / hydration_attribute_changed warnings. Today only
  # the synthetic --self-test runs; live-route assertions flip on once
  # #462 wires ViteManifest into each playground main.go. Scoped to basic
  # + ssr-stress to keep the playwright budget bounded.
  hydration-parity:
    name: hydration-parity (${{ matrix.playground }})
    needs: [changes, lint-and-test-pr]
    if: |
      (needs.changes.outputs.shared == 'true' ||
       needs.changes.outputs.sveltego == 'true' ||
       needs.changes.outputs.playground == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - playground: basic
            port: 3000
          - playground: ssr-stress
            port: 3000
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sidecar deps
        working-directory: packages/sveltego/internal/codegen/svelterender/sidecar
        run: npm ci --no-audit --no-fund

      - name: Install playground deps
        working-directory: playgrounds/${{ matrix.playground }}
        run: npm install --no-audit --no-fund

      - name: Install Playwright (npm)
        id: pw
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          npm init -y --silent >/dev/null
          npm install --no-audit --no-fund playwright
          ver=$(node -p "require('./node_modules/playwright/package.json').version")
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "PLAYWRIGHT_NODE_PATH=$RUNNER_TEMP/node_modules" >> "$GITHUB_ENV"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        shell: bash
        working-directory: ${{ runner.temp }}
        run: npx playwright install --with-deps chromium

      - name: Compile + Build (with client)
        working-directory: playgrounds/${{ matrix.playground }}
        run: |
          go run github.com/binsarjr/sveltego/packages/sveltego/cmd/sveltego compile
          go run github.com/binsarjr/sveltego/packages/sveltego/cmd/sveltego build --out ./build/app

      - name: Start server
        working-directory: playgrounds/${{ matrix.playground }}
        shell: bash
        run: |
          ./build/app &
          echo $! > server.pid
          for i in 1 2 3 4 5 6 7 8; do
            if curl -fsS -o /dev/null "http://localhost:${{ matrix.port }}/"; then
              exit 0
            fi
            sleep 1
          done
          echo "server did not become ready"
          kill "$(cat server.pid)" 2>/dev/null || true
          exit 1

      # Live-route hydration smoke is held on #471: PR #463 emits
      # `$state(...)` rune calls in client `.ts` files under
      # `.gen/client/__router/state.ts` (source: `packages/sveltego/internal/vite/state.go`),
      # which vite-plugin-svelte does not compile. The bundled router.js
      # throws "ReferenceError: $state is not defined" at hydration. #462
      # wires the playground ViteManifest so the bundle is at least
      # delivered to the browser; the live-mode flip lands once #471
      # renames the emit so vite-plugin-svelte picks the runes up.
      - name: Self-test (synthetic mismatch must fail the gate)
        shell: bash
        run: |
          set -euo pipefail
          node scripts/hydration-smoke.mjs \
            --base "http://localhost:${{ matrix.port }}" \
            --routes "/" \
            --self-test \
            --playwright-from "$PLAYWRIGHT_NODE_PATH"

      - name: Stop server
        if: always()
        working-directory: playgrounds/${{ matrix.playground }}
        shell: bash
        run: |
          if [ -f server.pid ]; then kill "$(cat server.pid)" 2>/dev/null || true; fi

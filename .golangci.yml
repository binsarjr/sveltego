run:
  timeout: 5m
  go: '1.22'
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - errorlint           # error wrapping correctness
    - gofumpt             # stricter gofmt
    - goimports
    - gosec               # security
    - govet
    - ineffassign
    - misspell
    - revive              # replaces golint
    - staticcheck         # incl. SA1019 deprecation
    - unconvert
    - unused
    - depguard            # forbidden imports
    - bodyclose
    - contextcheck        # ctx propagation
    - sloglint            # slog usage
    - tparallel
    - testifylint
    - gocritic
    - perfsprint

linters-settings:
  goimports:
    local-prefixes: github.com/binsarjr/sveltego

  errorlint:
    errorf: true
    asserts: true
    comparison: true

  gosec:
    excludes:
      - G104  # err checking is errcheck's job

  revive:
    rules:
      - name: package-comments
      - name: exported
      - name: unused-parameter

  sloglint:
    no-mixed-args: true
    kv-only: true
    static-msg: true
    no-raw-keys: true
    key-naming-case: snake

  depguard:
    rules:
      forbid-fmt-println-in-runtime:
        files:
          - '**/runtime/**'
          - '**/exports/**'
        deny:
          - pkg: fmt
            desc: use log/slog in runtime, not fmt.Println

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: cmd/
      linters:
        - depguard            # CLI may use fmt.Println
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: ''            # lint full repo always; pre-commit uses --new-from-rev
